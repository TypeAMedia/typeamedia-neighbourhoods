<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appealing Neighbourhood</title>

      <div class="header-desc">We analysed neighbourhoods and regions across England to identify <br /> which areas
        offer the

    </div>

      </div>

        <div class="map-legend-sixth"> </div>
        <div class="map-legend-seventh"> </div>
        <div class="map-legend-eighth"> </div>
        <div class="map-legend-ninth"> </div>
        <div class="map-legend-tenth"> </div>
        <div class="map-legend-eleventh"> </div>
        <div class="map-legend-twelfth"> </div>
        <div class="map-legend-thirteenth"> </div>
        <!-- <div class="map-legend-bar" id="map-legend-bar"></div> -->
        <span class="map-legend-high">Most appealing</span>
      </div>

    </div>
    <div class="rank-table-wrap" aria-label="Neighbourhood ranks table">
      <div id="rank-table"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/choices.js@10.2.0/public/assets/scripts/choices.min.js"></script>
  <script src="./map.js"></script>

</html>
